<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Text-to-Speech</title>
</head>
<body style="font-family: Arial; padding: 20px;">

<h2>🔊 Leitor de Texto</h2>

<input type="text" id="texto" placeholder="Digite algo..." value="As experiências acumuladas demonstram que o desafiador cenário globalizado talvez venha a ressaltar a relatividade do investimento em reciclagem técnica." style="width: 300px;"><br><br>

<label>Voz:</label><br>
<select id="vozes"></select><br><br>

<label>Velocidade:</label><br>
<input type="range" id="velocidade" min="0.5" max="2" step="0.1" value="1">
<span id="velLabel">1</span><br><br>

<button onclick="falar()">Falar</button>
<button onclick="parar()">Parar</button>

<script>

    
let vozes = [];

// Atualiza valor da velocidade na tela
const velInput = document.getElementById("velocidade");
const velLabel = document.getElementById("velLabel");

velInput.oninput = () => {
  velLabel.textContent = velInput.value;
};

// Carrega vozes disponíveis
speechSynthesis.onvoiceschanged = () => {
  vozes = speechSynthesis.getVoices();

  const select = document.getElementById("vozes");
  select.innerHTML = "";

  vozes.forEach((voz, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `${voz.name} (${voz.lang})`;
    select.appendChild(option);
  });
};

// Função falar
function falar() {
  const texto = document.getElementById("texto").value;
  const index = document.getElementById("vozes").value;

  if (!texto) {
    alert("Digite algum texto!");
    return;
  }

  const msg = new SpeechSynthesisUtterance(texto);

  msg.voice = vozes[index];
  msg.rate = parseFloat(velInput.value);
  msg.pitch = 1;
  msg.volume = 1;

  speechSynthesis.cancel(); // evita sobreposição
  speechSynthesis.speak(msg);
}

// Função parar
function parar() {
  speechSynthesis.cancel();
}

falar()
</script>

</body>
</html>
